

blog-listing-title: "Latest Articles"
filter-active: true
page-columns: true
image-column: page
format: 
  html:
    code-overflow: wrap
    html-math-method: mathjax
    highlight-style: github
    body-classes: "blog"
    code-copy: true
    code-line-numbers: false
    reading-time: true
    code-fold: true
    #code-summary: "Show the code"
    #code-tools: true
    #code-link: true
    shift-heading-level-by: 1
    reference-location: margin
    fig-cap-location: bottom
    smooth-scroll: true
    
    

# Default for table of contents
title-block-banner: true
page-layout: full
toc: true
toc-title: Table of contents
toc-location: right
page-size: 8

author:
  - name: Anthony Faustine
    url: https://sambaiga.github.io/
    orcid: 0000-0002-3948-3914
    affiliation: CIP, Eaton Corporation, Dublin Ireland.
    
citation: true
appendix-cite-as: bibtex

reading-time: true
word-count: true  
progress: true  
smooth-scroll: true
sr-attributes: true
engine: knitr

notebook-links: true
execute:
  eval: false
  echo: true
  warning: false
  message: false