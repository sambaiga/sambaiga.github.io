repos:
  # ----------------------------------
  # Core sanity checks
  # ----------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=5200"]
      - id: end-of-file-fixer
        exclude: ^(LICENSE$|.*\.(html|svg)$)
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v3.1.0"
    hooks:
      - id: prettier

  # ----------------------------------
  # Markdown / Quarto (.md, .qmd)
  # ----------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        files: "\\.(md|qmd)$"

  # ----------------------------------
  # Quarto validation (custom bash)
  # ----------------------------------
  - repo: local
    hooks:
      - id: quarto-yaml-validate
        name: Validate Quarto YAML frontmatter
        entry: bash scripts/validate_quarto.sh
        language: bash
        types: [markdown]
        files: "\.qmd$"
        stages: [commit]

      - id: bib-validate
        name: Validate bibliography files
        entry: bash scripts/validate_bib.sh
        language: bash
        files: "\.bib$"
        stages: [commit]

      - id: image-asset-check
        name: Validate image assets exist
        entry: bash scripts/validate_images.sh
        language: bash
        types: [markdown]
        files: "\.qmd$"
        stages: [commit]

  # ----------------------------------
  # Spelling (code + prose)
  # ----------------------------------
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
