<div class="grid-item">
<div class="card hoverable">
    {%- if post.image -%}
        <img class="image-preview" src="{{ post.image | prepend: '/assets/img/posts/' | relative_url }}"  height="10%"/>
    {%- endif -%}
    <div class="col-8 d-table-cell p-3">
        <h3>
          <a class="post-link" href="{{ post.url | relative_url }}">
            {{ post.title | escape }}
          </a>
        </h3>
        <p class="post-meta-description">{{ post.description }}</p>
          <p class="post-meta">{{ post.date | date: date_format }}</p>
      </div>
  </div>
</div>
